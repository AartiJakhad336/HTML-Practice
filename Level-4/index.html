<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>

        <!-- Navigation -->
        <nav>
            <a href="#home">Home</a> |
            <a href="#about">About</a> |
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Grouping using div -->
        <div id="home">
            <section>
                <h2>Home Section</h2>
                <p>Welcome to my website.</p>
            </section>
        </div>

        <div id="about">
            <article>
                <h2>About Me</h2>
                <p>I am learning HTML.</p>
            </article>
        </div>

        <div>
            <aside>
                <h3>Related Links</h3>
                <p>This is the sidebar content.</p>
            </aside>
        </div>

        <div id="contact">
            <section>
                <h2>Contact</h2>
                <p>Email: example@gmail.com</p>
            </section>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
